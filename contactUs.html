  <title>Contact Us</title>

<body>
  <!--Navbar Section-->

<!-- Book Appointment Form Section -->
<div class="landscape-form-wrap">
    <section class="Book Appointment">
        <form class="appointment-form" action="#" method="POST">
        <h2>Contact Us</h2>
    
        <div class="form-row">
            <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required />
            </div>
            <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required />
            </div>
        </div>
    
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
        </div>
    
        <div class="form-group">
          <label for="notes">Comments:</label>
        <textarea id="comment" name="comment" required rows="4" placeholder="Any questions or conerns..."></textarea>
        </div>
            <button type="submit">Submit</button>
        </form>
</div>
  </section>
  
    <!-- Footer -->
    <footer class="footer">
      <div class="footer__container">
          <!-- Footer Logo -->

              <a href="#" class="social__icon--link"><i class="fa-brands fa-facebook"></i></a>
          </div>
      </div>
</footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
