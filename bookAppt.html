 <div class="bookAppt__title">
    <h1>Book Your Appointment</h1>
</div>

</div>
  <!-- Appointment Form -->
  <div class="landscape-apptform-wrap">
  <section class="bookAppt__form">
    <form action="#" method="POST">
      <div class="input-group">
        <div>
          <label for="name">Full Name:</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div>
          <label for="phone">Phone Number:</label>
          <input type="tel" id="phone" name="phone" required />
        </div>
      </div>

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required />

      <div class="address-group">
        <label for="address-line1">Installation Address:</label>
        <input type="text" id="address-line1" name="address-line1" placeholder="Street Address" required />
        <input type="text" id="address-line2" name="address-line2" placeholder="Apartment, Suite, etc. (Optional)" />
      </div>

      <div class="input-group">
        <div>
          <label for="city">City:</label>
          <input type="text" id="city" name="city" required />
        </div>
        <div>
          <label for="state">State:</label>
          <input type="text" id="state" name="state" required />
        </div>
        <div>
          <label for="zip">Zip Code:</label>
          <input type="text" id="zip" name="zip" required />
        </div>
      </div>

      <div class="input-group">
        <div>
          <label for="vehicle-year">Vehicle Year:</label>
          <input type="number" id="vehicle-year" name="vehicle-year" min="1900" max="2025" required />
        </div>
        <div>
          <label for="vehicle-make">Make:</label>
          <input type="text" id="vehicle-make" name="vehicle-make" required />
        </div>
        <div>
          <label for="vehicle-model">Model:</label>
          <input type="text" id="vehicle-model" name="vehicle-model" required />
        </div>
      </div>

      <label for="appointment-date">Preferred Date:</label>
      <input type="date" id="appointment-date" name="appointment-date" required />

      <label for="services">Select Services:</label>
      <select id="services" name="services[]" multiple required>
        <option value="tire-installation">Tire Installation</option>
        <option value="flat-tire-repair">Flat Tire Repair</option>
        <option value="tire-rotation">Tire Rotation</option>
        <option value="sensor-programming">Sensor Programming</option>
        <option value="atv-utv-tires">ATV/UTV Tires</option>
        <option value="emergency-roadside">Emergency Roadside Service</option>
      </select>
      <label for="tire-size">Tire Size (optional):</label>
      <input type="text" id="tire-size" name="tire-size" placeholder="e.g., 225/65R17" />
      
      <label for="tire-brand">Preferred Tire Brand (optional):</label>
      <input type="text" id="tire-brand" name="tire-brand" placeholder="e.g., Michelin, Goodyear" />
      
      <label for="notes">Additional Notes:</label>
      <textarea id="notes" name="notes" rows="4" placeholder="Any specific instructions or requests..."></textarea>

      <button type="submit">Book Now</button>
    </form>
</div>
  </section>
